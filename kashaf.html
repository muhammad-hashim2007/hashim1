<!DOCTYPE html>
<html>
<head>
  <title>Catch My Heart 💖</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 20px;
      font-size: 36px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    }

    #scoreBoard {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .heart {
      position: absolute;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s ease;
    }

    .heart:hover {
      transform: scale(1.3);
    }

    /* Floating background hearts */
    .bg-heart {
      position: absolute;
      font-size: 20px;
      opacity: 0.6;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
      }
      to {
        transform: translateY(-10vh);
      }
    }
  </style>
</head>

<body>

  <h1>Kashaf, Catch My Heart 💖</h1>
  <div id="scoreBoard">Score: <span id="score">0</span></div>

  <!-- 🎵 MUSIC (CHANGE FILE NAME HERE 👇) -->
  <audio id="bgMusic" loop>
    <source src="Tu Jo Mileya(KoshalWorld.Com).mp3" type="audio/mpeg">
  </audio>

  <script>
    let score = 0;
    let musicStarted = false;

    function startMusic() {
      const audio = document.getElementById("bgMusic");
      audio.play().catch(e => console.log("Music error:", e));
    }

    function createHeart() {
      let heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤️";

      heart.style.left = Math.random() * (window.innerWidth - 50) + "px";
      heart.style.top = Math.random() * (window.innerHeight - 50) + "px";

      heart.onclick = function () {

        // 🎵 Start music on FIRST click
        if (!musicStarted) {
          startMusic();
          musicStarted = true;
        }

        score++;
        document.getElementById("score").innerText = score;

        // 💥 little pop effect
        heart.style.transform = "scale(2)";
        setTimeout(() => heart.remove(), 100);

        if (score === 15) {
          setTimeout(() => {
            window.location.href = "final1.html";
          }, 600);
        }
      };

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 2000);
    }

    setInterval(createHeart, 700);

    // 💖 background floating hearts
    function createBgHeart() {
      let bgHeart = document.createElement("div");
      bgHeart.classList.add("bg-heart");
      bgHeart.innerText = "💖";

      bgHeart.style.left = Math.random() * window.innerWidth + "px";
      bgHeart.style.animationDuration = (4 + Math.random() * 3) + "s";

      document.body.appendChild(bgHeart);

      setTimeout(() => bgHeart.remove(), 7000);
    }

    setInterval(createBgHeart, 500);
  </script>

</body>
</html>
