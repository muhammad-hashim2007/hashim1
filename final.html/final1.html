<!DOCTYPE html>
<html>
<head>
  <title>For Kashaf ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      color: #ff4d6d;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      color: #333;
      margin-top: 20px;
      line-height: 1.6;
    }

    .heart {
      font-size: 40px;
      animation: float 2s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
    <audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
</audio>
    <script>
  function createFloatingHeart() {
    const heart = document.createElement("div");
    heart.innerText = "💖";
    heart.style.position = "absolute";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.fontSize = "20px";

    document.body.appendChild(heart);

    let pos = window.innerHeight;

    const interval = setInterval(() => {
      pos -= 2;
      heart.style.top = pos + "px";

      if (pos < 0) {
        heart.remove();
        clearInterval(interval);
      }
    }, 20);
  }

  setInterval(createFloatingHeart, 500);
</script>

  <div class="card">
    <div class="heart">❤️</div>

    <h1>Kashaf ❤️</h1>

    <p>
      No matter what happens...<br><br>
      I just want you to know that you mean the world to me.<br><br>
      You’re not just someone I love…  
      you’re someone I never want to lose.<br><br>
      Thank you for being in my life 💖
    </p>

    <p><b>Forever yours ❤️</b></p>
  </div>

</body>
</html>
